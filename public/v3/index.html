<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>ccvoice</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #f1f5f9; --text2: #94a3b8; --accent: #818cf8;
      --green: #34d399; --red: #f87171; --yellow: #fbbf24;
      --radius: 12px; --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro', system-ui, sans-serif; overflow: hidden; }

    /* ─── Pair Screen ─── */
    .pair-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 24px; text-align: center; }
    .pair-logo { font-size: 48px; margin-bottom: 16px; }
    .pair-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .pair-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
    .pair-input { width: 240px; padding: 16px; font-size: 24px; text-align: center; letter-spacing: 0.3em; text-transform: uppercase; background: var(--surface); border: 2px solid var(--surface2); border-radius: var(--radius); color: var(--text); outline: none; }
    .pair-input:focus { border-color: var(--accent); }
    .pair-btn { width: 240px; padding: 14px; margin-top: 16px; font-size: 16px; font-weight: 600; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; }
    .pair-btn:disabled { opacity: 0.5; }
    .pair-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }
    .pair-hint { color: var(--text2); font-size: 13px; margin-top: 24px; }
    .pair-hint code { background: var(--surface); padding: 2px 6px; border-radius: 4px; }
    .pair-lock { display: inline-block; margin-right: 6px; font-size: 14px; color: var(--green); }

    /* ─── Main Screen ─── */
    .main-screen { display: none; flex-direction: column; height: 100%; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--surface2); padding-top: max(12px, env(safe-area-inset-top)); }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-meta { font-size: 12px; color: var(--text2); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: var(--green); }
    .status-dot.thinking { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.encrypted { background: var(--green); box-shadow: 0 0 4px var(--green); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px; }

    /* Terminal */
    .terminal { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'SF Mono', 'Menlo', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; -webkit-overflow-scrolling: touch; }
    .terminal-event { margin-bottom: 4px; }
    .terminal-event.user { color: var(--accent); }
    .terminal-event.assistant { color: var(--text); }
    .terminal-event.tool { color: var(--yellow); font-size: 12px; }
    .terminal-event.system { color: var(--text2); font-size: 12px; font-style: italic; }
    .terminal-event.error { color: var(--red); }
    .terminal-event.suggestion { color: var(--green); background: rgba(52,211,153,0.08); padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--green); margin: 8px 0; }
    .thinking-indicator { color: var(--yellow); }
    .thinking-indicator::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

    /* Participants */
    .participants { display: flex; gap: 4px; padding: 6px 16px; background: var(--surface); border-bottom: 1px solid var(--surface2); font-size: 12px; color: var(--text2); align-items: center; }
    .participant { background: var(--surface2); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .participant.owner { border: 1px solid var(--accent); color: var(--accent); }

    /* Input Area */
    .input-area { padding: 12px 16px; padding-bottom: max(12px, var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--surface2); }
    .input-row { display: flex; gap: 8px; }
    .text-input { flex: 1; padding: 10px 14px; font-size: 15px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 20px; color: var(--text); outline: none; }
    .text-input:focus { border-color: var(--accent); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .send-btn:disabled { opacity: 0.4; }
    .voice-btn { width: 100%; padding: 12px; margin-top: 8px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 20px; color: var(--text2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .voice-btn.listening { background: rgba(129,140,248,0.15); border-color: var(--accent); color: var(--accent); }
    .observer-hint { text-align: center; font-size: 12px; color: var(--text2); padding: 4px 0; }
  </style>
</head>
<body>

  <!-- ═══ Pair Screen ═══ -->
  <div class="pair-screen" id="pairScreen">
    <div class="pair-logo">🎙️</div>
    <h1 class="pair-title">ccvoice</h1>
    <p class="pair-subtitle">手机遥控你的 Claude Code</p>
    <input class="pair-input" id="nicknameInput" type="text" placeholder="你的昵称" maxlength="12" autocomplete="off" style="font-size: 16px; letter-spacing: normal; text-transform: none; margin-bottom: 12px;">
    <input class="pair-input" id="pairInput" type="text" placeholder="配对码 / 邀请码" maxlength="6" autocomplete="off">
    <button class="pair-btn" id="pairBtn">连接</button>
    <div class="pair-error" id="pairError"></div>
    <p class="pair-hint">Owner: 在电脑终端运行 <code>ccvoice</code> 看配对码 · Observer: 用 Owner 给的邀请码加入</p>
  </div>

  <!-- ═══ Main Screen ═══ -->
  <div class="main-screen" id="mainScreen">

    <div class="header">
      <div class="header-left">
        <div>
          <div class="header-title">
            <span class="status-dot disconnected" id="statusDot"></span>
            ccvoice
          </div>
          <div class="header-meta" id="headerMeta">未连接</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="newSessionBtn" title="新会话">🔄</button>
        <button class="icon-btn" id="disconnectBtn" title="断开">⏏</button>
      </div>
    </div>

    <div class="participants" id="participants" style="display:none">
      <span>在线:</span>
      <div id="participantList"></div>
    </div>

    <div class="terminal" id="terminal"></div>

    <div class="input-area">
      <div class="input-row">
        <input class="text-input" id="textInput" type="text" placeholder="输入指令..." autocomplete="off">
        <button class="send-btn" id="sendBtn">↑</button>
      </div>
      <button class="voice-btn" id="voiceBtn">🎤 按住说话</button>
    </div>

  </div>

  <script src="/v3/app.js"></script>
</body>
</html>
